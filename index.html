<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Кокос Предсказаний</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-image: url("Gemini_Generated_Image_g6ol0og6ol0og6ol.jpg");
            background-size: 400px auto;
            background-position: top left;
            background-repeat: repeat;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            perspective: 1200px;
            position: fixed;
            width: 100%;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, transparent 30%, rgba(61, 35, 16, 0.15) 100%);
            z-index: 0;
            pointer-events: none;
        }

        .title {
            position: absolute;
            top: 7vh;
            text-align: center;
            z-index: 5;
            width: 100%;
            padding: 0 20px;
        }

        .title h1 {
            font-size: 2.2em;
            color: #513119;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-shadow: 0px 1px 2px rgba(255, 255, 255, 0.6);
        }

        .title p {
            font-size: 0.9em;
            color: #ffffff;
            margin-top: 6px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0px 2px 5px rgba(0, 0, 0, 0.9);
        }

        .game-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 380px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        /* === КРАСИВЫЙ НАСТОЯЩИЙ КОКОС === */
        .coconut-image {
            width: 85%;
            max-width: 340px;
            height: auto;
            cursor: pointer;
            z-index: 5;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: center;
            touch-action: manipulation;
        }

        .coconut-image.floating {
            animation: naturalFloat 4s ease-in-out infinite;
        }

        @keyframes naturalFloat {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-10px) scale(1.02); }
        }

        /* Анимация исчезновения кокоса при клике */
        .coconut-image.disappear {
            transform: scale(0.5) rotate(-15deg);
            opacity: 0;
            pointer-events: none;
        }

        /* === ЭСТЕТИЧНЫЙ ЭКРАН ПРЕДСКАЗАНИЯ === */
        .scroll {
            position: absolute;
            width: 85%;
            max-width: 320px;
            /* Эффект матового премиального стекла со слегка теплым африканским оттенком */
            background: rgba(255, 253, 249, 0.88);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            
            padding: 30px 24px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(54, 30, 13, 0.15), 
                        inset 0 0 0 1px rgba(255, 255, 255, 0.5);
            text-align: center;
            color: #361e0d;
            font-size: 17px;
            font-weight: 700;
            line-height: 1.5;
            
            opacity: 0;
            transform: scale(0.8) translateY(20px);
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
            z-index: 10;
            border-bottom: 5px solid #e0843c;
        }

        .scroll.show {
            opacity: 1;
            transform: scale(1) translateY(0);
            pointer-events: auto;
        }

        .reset-btn {
            position: absolute;
            bottom: 8vh;
            padding: 15px 40px;
            background: #361e0d;
            color: #fff;
            border: none;
            border-radius: 30px;
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            cursor: pointer;
            box-shadow: 0 12px 24px rgba(54, 30, 13, 0.3);
            display: none;
            z-index: 20;
            transition: all 0.2s ease;
            -webkit-appearance: none;
        }

        .reset-btn:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>

    <div class="title">
        <h1>🥥 Кокос предсказаний</h1>
        <p>Коснись, чтобы открыть</p>
    </div>

    <div class="game-container">
        <!-- Настоящая сочная картинка вместо CSS-кода -->
        <img src="1642361019_1-papik-pro-p-kokos-klipart-1.png" class="coconut-image floating" id="coconut" alt="Кокос">
        
        <div class="scroll" id="scroll">
            <span id="predictionText">Ловим знаки вселенной...</span>
        </div>
    </div>

    <button class="reset-btn" id="resetBtn">🌴 Еще один кокос</button>

    <script>
        const predictions = [
            "📜 Хорошие новости уже в пути.",
            "🦁 Твоя харизма сегодня настолько сильна, что даже гепард уступит тебе дорогу.",
            "👑 Кто-то в Африке прямо сейчас молится богам, чтобы встретить такую же конфетку, как ты.",
            "☀️ Осторожно: твоя энергия сегодня горячее, чем полдень в пустыне Сахара. Купи вентилятор.",
            "🌴 Лови вайб «Акуна Матата»: сегодня официально разрешено забить на все проблемы.",
            "🐾 Даже если вокруг непроходимые джунгли, помни: у тебя внутри навигатор сильного льва.",
            "🔥 Сам вождь Буба лично одобрил твою кандидатуру на роль его фаворита. Сопротивление бесполезно.",
            "🍍 Вождь Буба считает, что ты выглядишь слишком горячо. Тебе грозит депортация за разжигание пожаров в джунглях.",
            "💰 Твои карманы скоро станут шире, чем уши африканского слона. Готовься грести бабки лопатой.",
            "🏋️‍♂️ Наша команда качков официально заявляет: перед твоей фигурой не устоит ни один фитнес-тренер.",
            "💅 Наши красотки завистливо вздыхают в сторонке: сегодня твоя харизма затмила абсолютно всех.",
            "🥥 Этот кокос открылся не просто так. Твоя удача активирована нашей командой лично!",
            "🤫 Тайное послание от создателей: ты выглядишь просто потрясающе. (Да-да, мы подглядываем через экран кокоса).",
            "⚡ Мы проехали всю Африку, нашли этот священный орех, а ты бац — и открыл его с одного тапа! Ну ты мощь.",
            "✨ Всё, что ты ищешь, уже внутри тебя.",
            "🌊 Скоро в твою жизнь войдёт что-то очень хорошее.",
            "🌿 Ты на правильном пути, продолжай.",
            "🍃 Судьба готовит тебе приятный сюрприз.",
            "🌟 Твои мечты гораздо ближе, чем кажется.",
            "🍀 Удача уже идёт по твоему следу.",
            "☀️ Сегодня твой день — смело действуй.",
            "🌙 Вселенная на твоей стороне."
        ];

        const coconut = document.getElementById('coconut');
        const scroll = document.getElementById('scroll');
        const predictionText = document.getElementById('predictionText');
        const resetBtn = document.getElementById('resetBtn');

        let isCracked = false;

        function handleCrack() {
            if (isCracked) return;
            isCracked = true;

            // Кокос красиво сжимается и исчезает
            coconut.classList.remove('floating');
            coconut.classList.add('disappear');

            // Подставляем текст
            predictionText.textContent = predictions[Math.floor(Math.random() * predictions.length)];

            // Плавно проявляем стильное матовое окошко
            setTimeout(() => {
                scroll.classList.add('show');
                resetBtn.style.display = 'block';
            }, 300);

            if (navigator.vibrate) navigator.vibrate(50);
        }

        coconut.addEventListener('click', handleCrack);

        resetBtn.addEventListener('click', () => {
            isCracked = false;
            resetBtn.style.display = 'none';
            scroll.classList.remove('show');
            
            // Возвращаем кокос на место
            setTimeout(() => {
                coconut.classList.remove('disappear');
                coconut.classList.add('floating');
            }, 300);
        });
    </script>
</body>
</html>
