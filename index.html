<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Кокос Предсказаний</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-image: url("Gemini_Generated_Image_g6ol0og6ol0og6ol.jpg");
            background-size: 400px auto;
            background-position: top left;
            background-repeat: repeat;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            perspective: 1200px;
            position: fixed;
            width: 100%;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, transparent 30%, rgba(61, 35, 16, 0.15) 100%);
            z-index: 0;
            pointer-events: none;
        }

        .title {
            position: absolute;
            top: 7vh;
            text-align: center;
            z-index: 5;
            width: 100%;
            padding: 0 20px;
        }

        .title h1 {
            font-size: 2.2em;
            color: #513119;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-shadow: 0px 1px 2px rgba(255, 255, 255, 0.6);
        }

        .title p {
            font-size: 0.9em;
            color: #ffffff;
            margin-top: 6px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0px 2px 5px rgba(0, 0, 0, 0.9);
        }

        .game-container {
            position: relative;
            width: 380px;
            height: 380px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        /* === НАСТРОЙКА КЛАССНОГО ЗИГЗАГ-РАЗЛОМА === */
        .coconut-wrapper {
            position: relative;
            width: 340px;
            height: 290px;
            cursor: pointer;
            z-index: 5;
            transform-style: preserve-3d;
            touch-action: manipulation;
        }

        .coconut-wrapper.floating {
            animation: naturalFloat 4s ease-in-out infinite;
        }

        @keyframes naturalFloat {
            0%, 100% { transform: translateY(0) rotate(0.5deg); }
            50% { transform: translateY(-8px) rotate(-0.5deg); }
        }

        /* Теперь обе половинки занимают ВСЮ ширину, но обрезаются зигзагом */
        .half {
            position: absolute;
            top: 0;
            left: 0;
            width: 340px;
            height: 290px;
            transition: transform 0.75s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.5s ease;
            pointer-events: none;
        }

        .half img {
            width: 340px;
            height: 290px;
            display: block;
        }

        /* Левая половина: оставляем левую часть и вырезаем рваный край по центру */
        .half-left {
            transform-origin: left center;
            -webkit-clip-path: polygon(0% 0%, 53% 0%, 48% 22%, 54% 41%, 47% 59%, 53% 78%, 49% 100%, 0% 100%);
            clip-path: polygon(0% 0%, 53% 0%, 48% 22%, 54% 41%, 47% 59%, 53% 78%, 49% 100%, 0% 100%);
        }

        /* Правая половина: зеркально подстраиваемся под рваную линию */
        .half-right {
            transform-origin: right center;
            -webkit-clip-path: polygon(53% 0%, 100% 0%, 100% 100%, 49% 100%, 53% 78%, 47% 59%, 54% 41%, 48% 22%);
            clip-path: polygon(53% 0%, 100% 0%, 100% 100%, 49% 100%, 53% 78%, 47% 59%, 54% 41%, 48% 22%);
        }

        /* При клике половинки сочно разлетаются по своим траекториям */
        .coconut-wrapper.cracked .half-left { 
            transform: translateX(-180px) translateY(-20px) rotate(-15deg); 
            opacity: 0; 
        }
        .coconut-wrapper.cracked .half-right { 
            transform: translateX(180px) translateY(-20px) rotate(15deg); 
            opacity: 0; 
        }

        /* === МАТОВАЯ ПЛАШКА ПРЕДСКАЗАНИЯ === */
        .scroll {
            position: absolute;
            width: 85%;
            max-width: 310px;
            background: rgba(255, 254, 250, 0.88);
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
            padding: 32px 24px;
            border-radius: 24px;
            box-shadow: 0 20px 45px rgba(54, 30, 13, 0.2), 
                        inset 0 0 0 1px rgba(255, 255, 255, 0.6);
            text-align: center;
            color: #361e0d;
            font-size: 17px;
            font-weight: 700;
            line-height: 1.5;
            opacity: 0;
            transform: scale(0.75) translateY(30px);
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
            z-index: 10;
            border-bottom: 5px solid #e0843c;
        }

        .scroll.show {
            opacity: 1;
            transform: scale(1) translateY(0);
            pointer-events: auto;
        }

        .reset-btn {
            position: absolute;
            bottom: 8vh;
            padding: 15px 40px;
            background: #361e0d;
            color: #fff;
            border: none;
            border-radius: 30px;
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            cursor: pointer;
            box-shadow: 0 12px 24px rgba(54, 30, 13, 0.3);
            display: none;
            z-index: 20;
            transition: all 0.2s ease;
            -webkit-appearance: none;
        }

        /* Осколки скорлупы */
        .shard {
            position: absolute;
            background: #5c3517;
            border-radius: 2px;
            pointer-events: none;
            z-index: 30;
            animation: splinterFly 0.65s cubic-bezier(0.1, 0.8, 0.25, 1) forwards;
        }
        @keyframes splinterFly {
            0% { opacity: 1; transform: translate(0,0) rotate(0) scale(1); }
            100% { opacity: 0; transform: translate(var(--tx), var(--ty)) rotate(180deg) scale(0.2); }
        }
    </style>
</head>
<body>

    <div class="title">
        <h1>🥥 Кокос предсказаний</h1>
        <p>Коснись, чтобы открыть</p>
    </div>

    <div class="game-container">
        <div class="coconut-wrapper floating" id="coconut">
            <div class="half half-left">
                <img src="1642361019_1-papik-pro-p-kokos-klipart-1.png" alt="Кокос">
            </div>
            <div class="half half-right">
                <img src="1642361019_1-papik-pro-p-kokos-klipart-1.png" alt="Кокос">
            </div>
        </div>
        
        <div class="scroll" id="scroll">
            <span id="predictionText">Ловим знаки вселенной...</span>
        </div>
    </div>

    <button class="reset-btn" id="resetBtn">🌴 Еще один кокос</button>

    <script>
        const predictions = [
            "📜 Хорошие новости уже в пути.",
            "🦁 Твоя харизма сегодня настолько сильна, что даже гепард уступит тебе дорогу.",
            "👑 Кто-то в Африке прямо сейчас молится богам, чтобы встретить такую же конфетку, как ты.",
            "☀️ Осторожно: твоя энергия сегодня горячее, чем полдень в пустыне Сахара. Купи вентилятор.",
            "🌴 Лови вайб «Акуна Матата»: сегодня официально разрешено забить на все проблемы.",
            "🐾 Даже если вокруг непроходимые джунгли, помни: у тебя внутри навигатор сильного льва.",
            "🔥 Сам вождь Буба лично одобрил твою кандидатуру на роль его фаворита. Сопротивление бесполезно.",
            "🍍 Вождь Буба считает, что ты выглядишь слишком горячо. Тебе грозит депортация за разжигание пожаров в джунглях.",
            "💰 Твои карманы скоро станут шире, чем уши африканского слона. Готовься грести бабки лопатой.",
            "🏋️‍♂️ Наша команда качков официально заявляет: перед твоей фигурой не устоит ни один фитнес-тренер.",
            "💅 Наши красотки завистливо вздыхают в сторонке: сегодня твоя харизма затмила абсолютно всех.",
            "🥥 Этот кокос разбился не просто так. Твоя удача активирована нашей командой лично!",
            "🤫 Тайное послание от создателей: ты выглядишь просто потрясающе. (Да-да, мы подглядываем через экран кокоса).",
            "⚡ Мы проехали всю Африку, нашли этот священный орех, а ты бац — и разбил его с одного тапа! Ну ты мощь.",
            "✨ Всё, что ты ищешь, уже внутри тебя.",
            "🌊 Скоро в твою жизнь войдёт что-то очень хорошее.",
            "🌿 Ты на правильном пути, продолжай.",
            "🍃 Судьба готовит тебе приятный сюрприз.",
            "🌟 Твои мечты гораздо ближе, чем кажется.",
            "🍀 Удача уже идёт по твоему следу.",
            "☀️ Сегодня твой день — смело действуй.",
            "🌙 Вселенная на твоей стороне."
        ];

        const coconut = document.getElementById('coconut');
        const scroll = document.getElementById('scroll');
        const predictionText = document.getElementById('predictionText');
        const resetBtn = document.getElementById('resetBtn');

        let isCracked = false;

        function handleCrack() {
            if (isCracked) return;
            isCracked = true;

            const rect = coconut.getBoundingClientRect();
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            spawnSplinters(centerX, centerY);

            coconut.classList.remove('floating');
            coconut.classList.add('cracked');

            predictionText.textContent = predictions[Math.floor(Math.random() * predictions.length)];

            setTimeout(() => {
                scroll.classList.add('show');
                resetBtn.style.display = 'block';
            }, 350);

            if (navigator.vibrate) navigator.vibrate(60);
        }

        coconut.addEventListener('click', handleCrack);

        resetBtn.addEventListener('click', () => {
            isCracked = false;
            resetBtn.style.display = 'none';
            scroll.classList.remove('show');
            coconut.classList.remove('cracked');
            setTimeout(() => { 
                if(!isCracked) coconut.classList.add('floating'); 
            }, 600);
        });

        function spawnSplinters(cx, cy) {
            for (let i = 0; i < 14; i++) {
                const shard = document.createElement('div');
                shard.classList.add('shard');
                
                const w = 4 + Math.random() * 6;
                const h = 8 + Math.random() * 12;
                shard.style.width = w + 'px';
                shard.style.height = h + 'px';
                shard.style.left = cx + 'px';
                shard.style.top = cy + 'px';
                
                const tx = (Math.random() - 0.5) * 420 + 'px';
                const ty = (Math.random() - 0.4) * 220 + 'px';
                shard.style.setProperty('--tx', tx);
                shard.style.setProperty('--ty', ty);
                
                coconut.appendChild(shard);
                setTimeout(() => shard.remove(), 650);
            }
        }
    </script>
</body>
</html>
